<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leon’s Personal Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('minecraft.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* Dark overlay for readability */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .container {
            text-align: center;
            margin-top: 100px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            margin: auto;
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 40px;
            text-shadow: 2px 2px 5px black;
        }

        p {
            font-size: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: limegreen;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: green;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>🎮 Welcome to Leon’s World!</h1>

            <p>Hey! I'm Leon 👋</p>
            <p>I like Minecraft, gaming, and coding cool stuff.</p>
            <p>This is my personal website 🚀</p>

            <a href="https://www.yahoo.com" target="_blank" class="btn">
                Go to Yahoo!
            </a>
        </div>
    </div>
</body>
</html>
