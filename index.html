
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon’s Pokémon World</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    color: white;
    text-align: center;

    /* 🔥 YOUR BACKGROUND IMAGE */
    background: url('pokemon.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Dark overlay so text is readable */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* Navbar */
.navbar {
    background: rgba(0,0,0,0.8);
    padding: 15px;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* Content */
.container {
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 25px;
    margin: 20px auto;
    max-width: 500px;
    border-radius: 15px;
    border: 4px solid black;
}

/* Title */
h1 {
    color: yellow;
    text-shadow: 3px 3px 0 black;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: red;
    color: white;
    border: 3px solid black;
    text-decoration: none;
}

.btn:hover {
    background: black;
}

.pokemon {
    width: 150px;
}

</style>
</head>

<body>

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#team">My Team</a>
</div>

<div class="container">

<section id="home">
<div class="card">
    <h1>⚡ Leon’s Pokémon World</h1>
    <img src="pikachu.png" class="pokemon">
    <p>Hey! I'm Leon, a Pokémon Trainer 👋</p>

    <a href="https://www.pokemon.com" target="_blank" class="btn">
        Visit Pokémon
    </a>
</div>
</section>

<section id="about">
<div class="card">
    <h1>👤 About Me</h1>
    <p>I love Pokémon, gaming, and building websites.</p>
</div>
</section>

<section id="team">
<div class="card">
    <h1>🔥 My Team</h1>
    <p>Pikachu ⚡</p>
    <p>Charizard 🔥</p>
    <p>Greninja 💧</p>
</div>
</section>

</div>

</body>
</html>
