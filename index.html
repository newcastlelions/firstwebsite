<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Snipers Prototype</title>
  <style>
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      background: white;
      display: block;
      margin: 0 auto;
      border: 2px solid #999;
    }
  </style>
</head>
<body>

<h2>🎯 Gadget Snipers (Turn-Based Battle)</h2>
<p>Arrow keys = Aim/Power | Space = Shoot | Take turns!</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player image
const playerImg = new Image();
playerImg.src = "leon.jpeg";

// 🔁 Turn system (0 = left, 1 = right)
let turn = 0;

// ❤️ Health
let players = [
  { x: 100, y: 300, angle: 45, power: 10, hp: 100 },
  { x: 700, y: 300, angle: 135, power: 10, hp: 100 }
];

// Enemy reference (current target)
function getAttacker() {
  return players[turn];
}
function getTarget() {
  return players[1 - turn];
}

// 🏔️ Ground mountain
let groundMountain = {
  p1: { x: 300, y: 320 },
  p2: { x: 400, y: 240 },
  p3: { x: 500, y: 320 }
};

// 🏔️ Ceiling mountain
let ceilingMountain = {
  p1: { x: 300, y: 80 },
  p2: { x: 400, y: 160 },
  p3: { x: 500, y: 80 }
};

let projectile = null;
const gravity = 0.3;

// Controls
document.addEventListener("keydown", e => {
  let p = getAttacker();

  if (e.key === "ArrowUp") p.angle += 2;
  if (e.key === "ArrowDown") p.angle -= 2;
  if (e.key === "ArrowRight") p.power += 0.5;
  if (e.key === "ArrowLeft") p.power -= 0.5;

  p.power = Math.max(2, Math.min(p.power, 25));

  if (e.code === "Space" && !projectile) shoot();
});

function shoot() {
  let p = getAttacker();
  let rad = p.angle * Math.PI / 180;

  projectile = {
    x: p.x,
    y: p.y,
    vx: Math.cos(rad) * p.power,
    vy: -Math.sin(rad) * p.power,
    radius: 8,
    bounces: 6,
    life: 0
  };
}

// Distance to line
function pointLineDistance(px, py, x1, y1, x2, y2) {
  let A = px - x1;
  let B = py - y1;
  let C = x2 - x1;
  let D = y2 - y1;

  let dot = A * C + B * D;
  let len_sq = C * C + D * D;
  let param = dot / len_sq;

  let xx, yy;

  if (param < 0) {
    xx = x1; yy = y1;
  } else if (param > 1) {
    xx = x2; yy = y2;
  } else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }

  let dx = px - xx;
  let dy = py - yy;
  return Math.sqrt(dx * dx + dy * dy);
}

// Reflect physics
function reflect(vx, vy, x1, y1, x2, y2) {
  let dx = x2 - x1;
  let dy = y2 - y1;

  let nx = -dy;
  let ny = dx;

  let len = Math.sqrt(nx * nx + ny * ny);
  nx /= len;
  ny /= len;

  let dot = vx * nx + vy * ny;

  return {
    vx: vx - 2 * dot * nx,
    vy: vy - 2 * dot * ny
  };
}

// Collision check
function checkTriangle(tri) {
  let sides = [
    [tri.p1, tri.p2],
    [tri.p2, tri.p3],
    [tri.p3, tri.p1]
  ];

  for (let [a, b] of sides) {
    let dist = pointLineDistance(
      projectile.x, projectile.y,
      a.x, a.y,
      b.x, b.y
    );

    if (dist < projectile.radius + 2) {
      let r = reflect(projectile.vx, projectile.vy, a.x, a.y, b.x, b.y);
      projectile.vx = r.vx * 0.8;
      projectile.vy = r.vy * 0.8;
      projectile.bounces--;
      return true;
    }
  }
  return false;
}

// Update
function update() {
  if (!projectile) return;

  projectile.x += projectile.vx;
  projectile.y += projectile.vy;

  projectile.vy += gravity;

  projectile.vx *= 0.999;
  projectile.vy *= 0.999;

  // Ground
  if (projectile.y > 300) {
    projectile.y = 300;
    projectile.vy *= -0.7;
    projectile.bounces--;
  }

  // Ceiling
  if (projectile.y < 100) {
    projectile.y = 100;
    projectile.vy *= -0.7;
    projectile.bounces--;
  }

  // Mountains
  checkTriangle(groundMountain);
  checkTriangle(ceilingMountain);

  projectile.life++;
  if (projectile.life > 800 || projectile.bounces <= 0) {
    switchTurn();
  }

  // Hit player
  let target = getTarget();
  let dist = Math.hypot(projectile.x - target.x, projectile.y - target.y);

  if (dist < 20) {
    target.hp -= 25;
    projectile = null;

    if (target.hp <= 0) {
      alert("🏆 Player " + (turn + 1) + " wins!");
      resetGame();
      return;
    }

    switchTurn();
  }
}

function switchTurn() {
  projectile = null;
  turn = 1 - turn;
}

function resetGame() {
  players[0].hp = 100;
  players[1].hp = 100;
  turn = 0;
}

// Draw triangle
function drawTriangle(t, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(t.p1.x, t.p1.y);
  ctx.lineTo(t.p2.x, t.p2.y);
  ctx.lineTo(t.p3.x, t.p3.y);
  ctx.closePath();
  ctx.fill();
}

// ❤️ Health bar
function drawHealthBar(p, x, y) {
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, 100, 10);

  ctx.fillStyle = "lime";
  ctx.fillRect(x, y, p.hp, 10);

  ctx.strokeStyle = "black";
  ctx.strokeRect(x, y, 100, 10);
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Mountains
  drawTriangle(groundMountain, "#777");
  drawTriangle(ceilingMountain, "#999");

  // Players
  players.forEach((p, i) => {
    ctx.drawImage(playerImg, p.x - 20, p.y - 40, 40, 40);

    let rad = p.angle * Math.PI / 180;
    ctx.strokeStyle = "black";
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(
      p.x + Math.cos(rad) * 40,
      p.y - Math.sin(rad) * 40
    );
    ctx.stroke();

    drawHealthBar(p, p.x - 50, p.y - 70);
  });

  // Projectile
  if (projectile) {
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // UI
  ctx.fillStyle = "black";
  ctx.fillText("Player " + (turn + 1) + "'s turn", 10, 20);
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
