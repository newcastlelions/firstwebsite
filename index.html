<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Snipers Prototype</title>
  <style>
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      background: white;
      display: block;
      margin: 0 auto;
      border: 2px solid #999;
    }
  </style>
</head>
<body>

<h2>🎯 Gadget Snipers (Moving Target Mode)</h2>
<p>Arrow keys = Aim/Power | Space = Shoot</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player image
const playerImg = new Image();
playerImg.src = "leon.jpeg";

// Player (fixed position)
let player = {
  x: 100,
  y: 300,
  angle: 45,
  power: 10
};

// 🎯 Moving target
let target = {
  x: 700,
  y: 200,
  radius: 20,
  direction: 1,
  speed: 2
};

// 🏔️ Ground mountain
let groundMountain = {
  p1: { x: 300, y: 320 },
  p2: { x: 400, y: 240 },
  p3: { x: 500, y: 320 }
};

// 🏔️ Ceiling mountain
let ceilingMountain = {
  p1: { x: 300, y: 80 },
  p2: { x: 400, y: 160 },
  p3: { x: 500, y: 80 }
};

let projectile = null;
const gravity = 0.3;

// Controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") player.angle += 2;
  if (e.key === "ArrowDown") player.angle -= 2;
  if (e.key === "ArrowRight") player.power += 0.5;
  if (e.key === "ArrowLeft") player.power -= 0.5;

  player.power = Math.max(2, Math.min(player.power, 25));

  if (e.code === "Space" && !projectile) shoot();
});

function shoot() {
  let rad = player.angle * Math.PI / 180;

  projectile = {
    x: player.x,
    y: player.y,
    vx: Math.cos(rad) * player.power,
    vy: -Math.sin(rad) * player.power,
    radius: 8,
    bounces: 6,
    life: 0
  };
}

// Move target up/down
function updateTarget() {
  target.y += target.speed * target.direction;

  if (target.y > 280) target.direction = -1;
  if (target.y < 120) target.direction = 1;
}

// Distance helper
function pointLineDistance(px, py, x1, y1, x2, y2) {
  let A = px - x1;
  let B = py - y1;
  let C = x2 - x1;
  let D = y2 - y1;

  let dot = A * C + B * D;
  let len_sq = C * C + D * D;
  let param = dot / len_sq;

  let xx, yy;

  if (param < 0) {
    xx = x1; yy = y1;
  } else if (param > 1) {
    xx = x2; yy = y2;
  } else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }

  let dx = px - xx;
  let dy = py - yy;
  return Math.sqrt(dx * dx + dy * dy);
}

// Reflection
function reflect(vx, vy, x1, y1, x2, y2) {
  let dx = x2 - x1;
  let dy = y2 - y1;

  let nx = -dy;
  let ny = dx;

  let len = Math.sqrt(nx * nx + ny * ny);
  nx /= len;
  ny /= len;

  let dot = vx * nx + vy * ny;

  return {
    vx: vx - 2 * dot * nx,
    vy: vy - 2 * dot * ny
  };
}

// Triangle collision
function checkTriangle(tri) {
  let sides = [
    [tri.p1, tri.p2],
    [tri.p2, tri.p3],
    [tri.p3, tri.p1]
  ];

  for (let [a, b] of sides) {
    let dist = pointLineDistance(
      projectile.x, projectile.y,
      a.x, a.y,
      b.x, b.y
    );

    if (dist < projectile.radius + 2) {
      let r = reflect(projectile.vx, projectile.vy, a.x, a.y, b.x, b.y);
      projectile.vx = r.vx * 0.8;
      projectile.vy = r.vy * 0.8;
      projectile.bounces--;
      return true;
    }
  }
  return false;
}

// Update physics
function update() {
  updateTarget();

  if (!projectile) return;

  projectile.x += projectile.vx;
  projectile.y += projectile.vy;

  projectile.vy += gravity;

  projectile.vx *= 0.999;
  projectile.vy *= 0.999;

  // Ground
  if (projectile.y > 300) {
    projectile.y = 300;
    projectile.vy *= -0.7;
    projectile.bounces--;
  }

  // Ceiling
  if (projectile.y < 100) {
    projectile.y = 100;
    projectile.vy *= -0.7;
    projectile.bounces--;
  }

  checkTriangle(groundMountain);
  checkTriangle(ceilingMountain);

  projectile.life++;
  if (projectile.life > 800 || projectile.bounces <= 0) {
    projectile = null;
  }

  // Hit target
  let dist = Math.hypot(projectile.x - target.x, projectile.y - target.y);
  if (dist < target.radius) {
    alert("🎯 HIT!");
    projectile = null;
  }
}

// Draw triangle
function drawTriangle(t, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(t.p1.x, t.p1.y);
  ctx.lineTo(t.p2.x, t.p2.y);
  ctx.lineTo(t.p3.x, t.p3.y);
  ctx.closePath();
  ctx.fill();
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Mountains
  drawTriangle(groundMountain, "#777");
  drawTriangle(ceilingMountain, "#999");

  // Player
  ctx.drawImage(playerImg, player.x - 20, player.y - 40, 40, 40);

  // Aim line
  let rad = player.angle * Math.PI / 180;
  ctx.strokeStyle = "black";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(rad) * 40,
    player.y - Math.sin(rad) * 40
  );
  ctx.stroke();

  // Target
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
  ctx.fill();

  // Projectile
  if (projectile) {
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // UI
  ctx.fillStyle = "black";
  ctx.fillText("Angle: " + player.angle.toFixed(1), 10, 20);
  ctx.fillText("Power: " + player.power.toFixed(1), 10, 40);
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
