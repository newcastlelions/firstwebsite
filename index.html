
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: url('pokemon.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align: center;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

h1 {
    margin-top: 20px;
    color: yellow;
    text-shadow: 3px 3px black;
}

#pokedex {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

/* Pokémon card */
.pokemon {
    background: white;
    color: black;
    border-radius: 10px;
    margin: 10px;
    padding: 15px;
    width: 150px;
    border: 3px solid black;
    transition: 0.2s;
}

.pokemon:hover {
    transform: scale(1.1);
}

.pokemon img {
    width: 100px;
}

</style>
</head>

<body>

<h1>📖 Pokédex</h1>

<div id="pokedex"></div>

<script>
const pokedex = document.getElementById("pokedex");

// Load first 151 Pokémon (can increase later)
for (let i = 1; i <= 151; i++) {
    fetch(`https://pokeapi.co/api/v2/pokemon/${i}`)
        .then(res => res.json())
        .then(data => {

            const card = document.createElement("div");
            card.classList.add("pokemon");

            card.innerHTML = `
                <h3>${data.name}</h3>
                <img src="${data.sprites.front_default}">
                <p>#${data.id}</p>
            `;

            pokedex.appendChild(card);
        });
}
</script>

</body>
</html>
