<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon World</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: url('pokemon.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Dark overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.navbar {
    background: rgba(0,0,0,0.85);
    padding: 15px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 10;
    text-align: center;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.container {
    padding-top: 120px;
    max-width: 1200px;
    margin: auto;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 25px;
    margin: 20px auto;
    border-radius: 15px;
    border: 4px solid black;
}

/* Titles */
h1 {
    color: yellow;
    text-shadow: 3px 3px 0 black;
    margin-top: 20px;
}

/* Buttons */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: red;
    color: white;
    border: 3px solid black;
    text-decoration: none;
}

.btn:hover {
    background: black;
}

/* Pokédex */
#pokedex {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.pokemon {
    background: white;
    color: black;
    border-radius: 10px;
    margin: 10px;
    padding: 15px;
    width: 150px;
    border: 3px solid black;
    transition: 0.2s;
}

.pokemon:hover {
    transform: scale(1.1);
}

.pokemon img {
    width: 100px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#team">My Team</a>
    <a href="#pokedex-section">Pokédex</a>
</div>

<div class="container">

<!-- Home -->
<section id="home">
<div class="card">
    <h1>⚡ Pokémon World</h1>
    <p>Welcome, Trainer 👋</p>
    <p>Explore Pokémon, your team, and the Pokédex!</p>
    <a href="https://www.pokemon.com" target="_blank" class="btn">Visit Pokémon</a>
</div>
</section>

<!-- About -->
<section id="about">
<div class="card">
    <h1>👤 About</h1>
    <p>This is a Pokémon fan website, featuring your favorite Pokémon and a full Pokédex.</p>
</div>
</section>

<!-- My Team -->
<section id="team">
<div class="card">
    <h1>🔥 My Team</h1>
    <p>Pikachu ⚡</p>
    <p>Charizard 🔥</p>
    <p>Greninja 💧</p>
</div>
</section>

<!-- Pokédex -->
<section id="pokedex-section">
<div class="card">
    <h1>📖 Pokédex</h1>
    <div id="pokedex"></div>
</div>
</section>

</div>

<!-- Pokédex Script -->
<script>
const pokedex = document.getElementById("pokedex");

// Load first 151 Pokémon (Gen 1)
for (let i = 1; i <= 151; i++) {
    fetch(`https://pokeapi.co/api/v2/pokemon/${i}`)
        .then(res => res.json())
        .then(data => {
            const card = document.createElement("div");
            card.classList.add("pokemon");
            card.innerHTML = `
                <h3>${data.name}</h3>
                <img src="${data.sprites.front_default}">
                <p>#${data.id}</p>
            `;
            pokedex.appendChild(card);
        });
}
</script>

</body>
</html>
