<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Snipers Prototype</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      background: #222;
      display: block;
      margin: 0 auto;
      border: 2px solid #555;
    }
  </style>
</head>
<body>

<h2>🎯 Gadget Snipers (Improved)</h2>
<p>Arrow keys = Aim/Power | Space = Shoot</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player image
const playerImg = new Image();
playerImg.src = "leon.jpeg";

// Player
let player = {
  x: 100,
  y: 300,
  angle: 45,
  power: 10
};

// Enemy
let enemy = {
  x: 700,
  y: 300,
  radius: 20
};

// Mountain triangle
let mountain = {
  p1: { x: 350, y: 320 },
  p2: { x: 400, y: 240 },
  p3: { x: 450, y: 320 }
};

// Projectile
let projectile = null;

const gravity = 0.3;

// Controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") player.angle += 2;
  if (e.key === "ArrowDown") player.angle -= 2;
  if (e.key === "ArrowRight") player.power += 0.5;
  if (e.key === "ArrowLeft") player.power -= 0.5;

  player.power = Math.max(2, Math.min(player.power, 25));

  if (e.code === "Space" && !projectile) shoot();
});

function shoot() {
  let rad = player.angle * Math.PI / 180;

  projectile = {
    x: player.x,
    y: player.y,
    vx: Math.cos(rad) * player.power,
    vy: -Math.sin(rad) * player.power,
    radius: 8,
    bounces: 5,
    life: 0
  };
}

// Distance from point to line
function pointLineDistance(px, py, x1, y1, x2, y2) {
  let A = px - x1;
  let B = py - y1;
  let C = x2 - x1;
  let D = y2 - y1;

  let dot = A * C + B * D;
  let len_sq = C * C + D * D;
  let param = dot / len_sq;

  let xx, yy;

  if (param < 0) {
    xx = x1;
    yy = y1;
  } else if (param > 1) {
    xx = x2;
    yy = y2;
  } else {
    xx = x1 + param * C;
    yy = y1 + param * D;
  }

  let dx = px - xx;
  let dy = py - yy;
  return Math.sqrt(dx * dx + dy * dy);
}

// Reflect velocity off a line
function reflect(vx, vy, x1, y1, x2, y2) {
  let dx = x2 - x1;
  let dy = y2 - y1;

  // normal
  let nx = -dy;
  let ny = dx;

  let length = Math.sqrt(nx * nx + ny * ny);
  nx /= length;
  ny /= length;

  let dot = vx * nx + vy * ny;

  return {
    vx: vx - 2 * dot * nx,
    vy: vy - 2 * dot * ny
  };
}

// Update
function update() {
  if (projectile) {
    projectile.x += projectile.vx;
    projectile.y += projectile.vy;

    projectile.vy += gravity;

    projectile.vx *= 0.999;
    projectile.vy *= 0.999;

    // Ground
    if (projectile.y > 300) {
      projectile.y = 300;
      projectile.vy *= -0.7;
      projectile.bounces--;
    }

    // Walls
    if (projectile.x < 0 || projectile.x > canvas.width) {
      projectile.vx *= -0.8;
    }

    // 🏔️ Check each triangle side
    let sides = [
      [mountain.p1, mountain.p2],
      [mountain.p2, mountain.p3],
      [mountain.p3, mountain.p1]
    ];

    for (let [a, b] of sides) {
      let dist = pointLineDistance(
        projectile.x,
        projectile.y,
        a.x,
        a.y,
        b.x,
        b.y
      );

      if (dist < projectile.radius + 2) {
        let r = reflect(projectile.vx, projectile.vy, a.x, a.y, b.x, b.y);
        projectile.vx = r.vx * 0.8;
        projectile.vy = r.vy * 0.8;
        projectile.bounces--;
        break;
      }
    }

    // Lifetime
    projectile.life++;
    if (projectile.life > 600 || projectile.bounces <= 0) {
      projectile = null;
    }

    // Hit enemy
    if (projectile) {
      let dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
      if (dist < enemy.radius) {
        alert("💥 Hit!");
        projectile = null;
        resetEnemy();
      }
    }
  }
}

function resetEnemy() {
  enemy.x = 600 + Math.random() * 150;
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 320, 800, 80);

  // Mountain
  ctx.fillStyle = "#775533";
  ctx.beginPath();
  ctx.moveTo(mountain.p1.x, mountain.p1.y);
  ctx.lineTo(mountain.p2.x, mountain.p2.y);
  ctx.lineTo(mountain.p3.x, mountain.p3.y);
  ctx.closePath();
  ctx.fill();

  // Player
  ctx.drawImage(playerImg, player.x - 20, player.y - 40, 40, 40);

  // Aim
  let rad = player.angle * Math.PI / 180;
  ctx.strokeStyle = "white";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(rad) * 40,
    player.y - Math.sin(rad) * 40
  );
  ctx.stroke();

  // Enemy
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
  ctx.fill();

  // Projectile
  if (projectile) {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Angle: " + player.angle.toFixed(1), 10, 20);
  ctx.fillText("Power: " + player.power.toFixed(1), 10, 40);
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
