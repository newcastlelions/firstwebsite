<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Racing Game</title>
<style>
  body {
    margin: 0;
    background: #222;
    text-align: center;
    color: white;
    font-family: Arial;
  }
  canvas {
    background: #555;
    display: block;
    margin: auto;
    border: 2px solid #999;
  }
</style>
</head>
<body>

<h2>🏎️ Racing Game</h2>
<p>↑ = Accelerate | ← → = Steer</p>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// GAME STATE
let speed = 0;
let maxSpeed = 8;
let acceleration = 0.2;
let friction = 0.05;

let score = 0;
let gameOver = false;

// PLAYER
let car = {
  x: 200,
  y: 500,
  width: 40,
  height: 70,
  speedX: 0
};

// INPUT
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// OBSTACLES
let obstacles = [];

// spawn obstacles
function spawnObstacle() {
  let width = 40;
  let x = Math.random() * (canvas.width - width);

  obstacles.push({
    x: x,
    y: -80,
    width: width,
    height: 70
  });
}

// spawn every 1 second
setInterval(() => {
  if (!gameOver) spawnObstacle();
}, 1000);

// UPDATE
function update() {
  if (gameOver) return;

  // ACCELERATION
  if (keys["ArrowUp"]) {
    speed += acceleration;
  } else {
    speed -= friction;
  }

  speed = Math.max(0, Math.min(maxSpeed, speed));

  // STEERING
  if (keys["ArrowLeft"]) {
    car.x -= 4;
  }
  if (keys["ArrowRight"]) {
    car.x += 4;
  }

  // keep inside road
  car.x = Math.max(0, Math.min(canvas.width - car.width, car.x));

  // MOVE OBSTACLES
  obstacles.forEach((obs, index) => {
    obs.y += speed;

    // collision
    if (
      car.x < obs.x + obs.width &&
      car.x + car.width > obs.x &&
      car.y < obs.y + obs.height &&
      car.y + car.height > obs.y
    ) {
      gameOver = true;
    }

    // remove off screen + score
    if (obs.y > canvas.height) {
      obstacles.splice(index, 1);
      score++;
    }
  });
}

// DRAW ROAD
let roadOffset = 0;

function drawRoad() {
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // dashed center lines
  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.setLineDash([20, 20]);

  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, -roadOffset);
  ctx.lineTo(canvas.width / 2, canvas.height);
  ctx.stroke();

  roadOffset += speed;
  if (roadOffset > 40) roadOffset = 0;

  ctx.setLineDash([]);
}

// DRAW
function draw() {
  drawRoad();

  // player car
  ctx.fillStyle = "cyan";
  ctx.fillRect(car.x, car.y, car.width, car.height);

  // obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(obs => {
    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
  });

  // UI
  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 10, 30);
  ctx.fillText("Speed: " + speed.toFixed(1), 10, 55);

  // GAME OVER
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 110, 300);

    ctx.font = "20px Arial";
    ctx.fillText("Final Score: " + score, 120, 340);
  }
}

// LOOP
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
