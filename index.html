<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadget Snipers Prototype</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    canvas {
      background: #222;
      display: block;
      margin: 0 auto;
      border: 2px solid #555;
    }
  </style>
</head>
<body>

<h2>🎯 Gadget Snipers (Improved)</h2>
<p>Arrow keys = Aim/Power | Space = Shoot</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 🧍 Player image
const playerImg = new Image();
playerImg.src = "leon.jpeg";

// Player
let player = {
  x: 100,
  y: 300,
  angle: 45,
  power: 10
};

// Enemy
let enemy = {
  x: 700,
  y: 300,
  radius: 20
};

// 🏔️ Mountain (triangle points)
let mountain = {
  p1: { x: 350, y: 320 },
  p2: { x: 400, y: 240 },
  p3: { x: 450, y: 320 }
};

// Projectile
let projectile = null;

const gravity = 0.3;

// Controls
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") player.angle += 2;
  if (e.key === "ArrowDown") player.angle -= 2;
  if (e.key === "ArrowRight") player.power += 0.5;
  if (e.key === "ArrowLeft") player.power -= 0.5;

  player.power = Math.max(2, Math.min(player.power, 25));

  if (e.code === "Space" && !projectile) shoot();
});

function shoot() {
  let rad = player.angle * Math.PI / 180;

  projectile = {
    x: player.x,
    y: player.y,
    vx: Math.cos(rad) * player.power,
    vy: -Math.sin(rad) * player.power,
    radius: 8,
    bounces: 5,
    life: 0
  };
}

// 🔺 Check if point inside triangle
function pointInTriangle(px, py, a, b, c) {
  function sign(p1, p2, p3) {
    return (p1.x - p3.x) * (p2.y - p3.y) - (p2.x - p3.x) * (p1.y - p3.y);
  }

  let d1 = sign({x:px,y:py}, a, b);
  let d2 = sign({x:px,y:py}, b, c);
  let d3 = sign({x:px,y:py}, c, a);

  let hasNeg = (d1 < 0) || (d2 < 0) || (d3 < 0);
  let hasPos = (d1 > 0) || (d2 > 0) || (d3 > 0);

  return !(hasNeg && hasPos);
}

// Update physics
function update() {
  if (projectile) {
    projectile.x += projectile.vx;
    projectile.y += projectile.vy;

    projectile.vy += gravity;

    projectile.vx *= 0.999;
    projectile.vy *= 0.999;

    let dx = enemy.x - projectile.x;
    projectile.vx += dx * 0.0005;

    // Ground
    if (projectile.y > 300) {
      projectile.y = 300;
      projectile.vy *= -0.7;
      projectile.bounces--;
    }

    // Walls
    if (projectile.x < 0) {
      projectile.x = 0;
      projectile.vx *= -0.8;
    }

    if (projectile.x > canvas.width) {
      projectile.x = canvas.width;
      projectile.vx *= -0.8;
    }

    // 🏔️ REAL triangle collision
    if (pointInTriangle(
        projectile.x,
        projectile.y,
        mountain.p1,
        mountain.p2,
        mountain.p3
    )) {
      // Push projectile upward + bounce
      projectile.y -= 5;
      projectile.vy *= -0.8;
      projectile.vx *= 0.9;
      projectile.bounces--;
    }

    // Lifetime
    projectile.life++;
    if (projectile.life > 600) projectile = null;

    if (projectile && projectile.bounces <= 0) {
      projectile = null;
    }

    // Hit enemy
    if (projectile) {
      let dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);
      if (dist < enemy.radius) {
        alert("💥 Hit!");
        projectile = null;
        resetEnemy();
      }
    }
  }
}

function resetEnemy() {
  enemy.x = 600 + Math.random() * 150;
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 320, 800, 80);

  // 🏔️ Draw triangle mountain
  ctx.fillStyle = "#775533";
  ctx.beginPath();
  ctx.moveTo(mountain.p1.x, mountain.p1.y);
  ctx.lineTo(mountain.p2.x, mountain.p2.y);
  ctx.lineTo(mountain.p3.x, mountain.p3.y);
  ctx.closePath();
  ctx.fill();

  // Player image
  ctx.drawImage(playerImg, player.x - 20, player.y - 40, 40, 40);

  // Aim line
  let rad = player.angle * Math.PI / 180;
  ctx.strokeStyle = "white";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(rad) * 40,
    player.y - Math.sin(rad) * 40
  );
  ctx.stroke();

  // Enemy
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
  ctx.fill();

  // Projectile
  if (projectile) {
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(projectile.x, projectile.y, projectile.radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("Angle: " + player.angle.toFixed(1), 10, 20);
  ctx.fillText("Power: " + player.power.toFixed(1), 10, 40);
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
