<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leon’s Pokémon World</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: linear-gradient(to bottom, red 50%, white 50%);
    color: black;
    text-align: center;
}

/* Pokeball line */
body::before {
    content: "";
    position: fixed;
    top: 50%;
    width: 100%;
    height: 10px;
    background: black;
}

/* Center circle */
body::after {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 80px;
    height: 80px;
    background: white;
    border: 10px solid black;
    border-radius: 50%;
    transform: translate(-50%, -50%);
}

.navbar {
    background: black;
    padding: 15px;
}

.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.container {
    padding: 40px 20px;
}

.card {
    background: white;
    padding: 25px;
    margin: 20px auto;
    max-width: 500px;
    border-radius: 15px;
    border: 5px solid black;
}

/* Title glow */
h1 {
    color: yellow;
    text-shadow: 3px 3px 0 black;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: red;
    color: white;
    border: 3px solid black;
    text-decoration: none;
}

.btn:hover {
    background: black;
}

/* Pokémon image */
.pokemon {
    width: 150px;
}

</style>
</head>

<body>

<div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#team">My Team</a>
</div>

<div class="container">

<section id="home">
<div class="card">
    <h1>⚡ Leon’s Pokémon World</h1>
    <img src="pikachu.png" class="pokemon">
    <p>Hey! I'm Leon, a Pokémon Trainer 👋</p>

    <a href="https://www.pokemon.com" target="_blank" class="btn">
        Visit Pokémon
    </a>
</div>
</section>

<section id="about">
<div class="card">
    <h1>👤 About Me</h1>
    <p>I love Pokémon, gaming, and building websites.</p>
    <p>My goal is to become a Pokémon Master 🏆</p>
</div>
</section>

<section id="team">
<div class="card">
    <h1>🔥 My Team</h1>
    <p>Pikachu ⚡</p>
    <p>Charizard 🔥</p>
    <p>Greninja 💧</p>
</div>
</section>

</div>

</body>
</html>
